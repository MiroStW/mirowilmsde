name: Deploy to miro-wilms.de

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: git-checkout
        uses: actions/checkout@v4
      - name: Install
        shell: "bash"
        run: npm install
      - name: Build
        shell: "bash"
        run: npm run build
      - name: Deploy
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: publish
          FOLDER: dist
          TARGET_DIR: ./
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Deploy to Plesk via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 202.61.232.229
          username: hosting198196
          password: ${{ secrets.PLESK_FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /miro-wilms.de/httpdocs/
